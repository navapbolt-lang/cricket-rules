# Cricket Rules AI — production site config
# Replace DOMAIN_NAME with your actual domain before deploying

upstream app_backend {
    server app:8000;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN_NAME;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name DOMAIN_NAME;

    ssl_certificate /etc/letsencrypt/live/DOMAIN_NAME/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_NAME/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Widget static assets (served directly by nginx for speed)
    location /widget/ {
        alias /var/www/frontend/widget/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        limit_req zone=widget burst=50 nodelay;
    }

    # API proxy
    location /api/ {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        limit_req zone=api burst=20 nodelay;
    }

    # Health check (no rate limit)
    location /api/v1/health {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
        limit_req zone=health burst=5 nodelay;
    }

    # Widget embed script (served directly)
    location /embed.js {
        alias /var/www/frontend/widget/embed.js;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Admin dashboard
    location /admin/ {
        alias /var/www/frontend/admin/;
        expires 1d;
    }

    # Error pages
    error_page 404 /404.html;
    error_page 429 /429.html;
    error_page 500 502 503 504 /50x.html;

    location = /429.html {
        internal;
        return 429 '{"error":"rate_limit_exceeded","code":"TOO_MANY_REQUESTS"}';
    }

    # Deny access to sensitive files
    location ~ /\.(env|git|htaccess|htpasswd) {
        deny all;
    }
}
