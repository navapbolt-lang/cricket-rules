services:
  - type: web
    name: cricketgpt
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      # ── LLM Provider ──
      - key: GROQ_API_KEY
        sync: false  # Set manually in dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: WEB_SEARCH_ENABLED
        value: "true"
      - key: LLM_PROVIDER
        value: "groq"
      - key: LLM_MODEL
        value: "llama-3.3-70b-versatile"

      # ── Vector Database (Qdrant Cloud) ──
      - key: QDRANT_URL
        sync: false  # Set to your Qdrant Cloud URL
      - key: QDRANT_API_KEY
        sync: false

      # ── Auth ──
      - key: ADMIN_API_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true

      # ── App Config ──
      - key: DEFAULT_PLAN
        value: "starter"
      - key: DEFAULT_MONTHLY_QUOTA
        value: "10000"
      - key: LOG_LEVEL
        value: "INFO"
